specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Visioconference
providerId: visioconference
publisherName: Visioconference
serviceCategory: API
created: '2026-05-04'
modified: '2026-05-04'
tags:
  - Audio
  - Chat
  - Collaboration
  - Communication
  - Conferencing
  - Live Streaming
  - Real-Time
  - Remote Work
  - Screen Sharing
  - Video
